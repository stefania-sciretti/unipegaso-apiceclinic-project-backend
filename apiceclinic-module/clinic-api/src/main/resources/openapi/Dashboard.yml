openapi: 3.0.0
info:
  title: Dashboard API
  description: Aggregated statistics for the clinic dashboard
  version: "1.0.0"
servers:
  - url: "http://localhost:8080"

paths:
  /api/dashboard:
    get:
      summary: Get dashboard statistics
      description: >
        Returns aggregated KPIs, revenue by month, appointments by month and revenue by area.
        The `period` parameter controls how many months of historical data are included.
      operationId: getDashboard
      tags: [Dashboard]
      parameters:
        - name: period
          in: query
          required: false
          description: "Time period: 1m, 3m, 6m (default), 1y"
          schema:
            type: string
            enum: [1m, 3m, 6m, 1y]
            default: 6m
            example: "6m"
      responses:
        "200":
          description: Dashboard statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStatsResponse"
        "400":
          description: Invalid period value
        "401":
          description: Unauthorized

components:
  schemas:

    KpiStats:
      type: object
      required:
        - revenueMonth
        - revenuePrevMonth
        - activePatients
        - newPatients
        - appointmentsMonth
        - cancellationRate
        - agendaOccupancy
      properties:
        revenueMonth:
          type: number
          format: double
          description: Revenue for the current month (€)
          example: 4250.00
        revenuePrevMonth:
          type: number
          format: double
          description: Revenue for the previous month (€)
          example: 3980.00
        activePatients:
          type: integer
          format: int64
          description: Number of active patients in the period
          example: 42
        newPatients:
          type: integer
          format: int64
          description: New patients registered in the period
          example: 7
        appointmentsMonth:
          type: integer
          format: int64
          description: Total appointments in the current month
          example: 38
        cancellationRate:
          type: number
          format: double
          description: Appointment cancellation rate (0–1)
          example: 0.08
        agendaOccupancy:
          type: number
          format: double
          description: Agenda occupancy rate (0–1)
          example: 0.75

    RevenueByMonth:
      type: object
      required: [month, total]
      properties:
        month:
          type: string
          description: Month label (yyyy-MM)
          example: "2026-04"
        total:
          type: number
          format: double
          description: Total revenue for the month (€)
          example: 3980.00

    AppointmentsByMonth:
      type: object
      required: [month, booked, completed, cancelled]
      properties:
        month:
          type: string
          description: Month label (yyyy-MM)
          example: "2026-04"
        booked:
          type: integer
          format: int64
          example: 45
        completed:
          type: integer
          format: int64
          example: 38
        cancelled:
          type: integer
          format: int64
          example: 4

    AreaInfo:
      type: object
      required: [areaId, areaName]
      properties:
        areaId:
          type: integer
          format: int64
          example: 1
        areaName:
          type: string
          example: "Alimentazione"

    RevenueByArea:
      type: object
      required: [area, total]
      properties:
        area:
          $ref: "#/components/schemas/AreaInfo"
        total:
          type: number
          format: double
          description: Total revenue for the area in the period (€)
          example: 1200.00

    DashboardStatsResponse:
      type: object
      required:
        - kpi
        - revenueByMonth
        - appointmentsByMonth
        - revenueByArea
      properties:
        kpi:
          $ref: "#/components/schemas/KpiStats"
        revenueByMonth:
          type: array
          items:
            $ref: "#/components/schemas/RevenueByMonth"
        appointmentsByMonth:
          type: array
          items:
            $ref: "#/components/schemas/AppointmentsByMonth"
        revenueByArea:
          type: array
          items:
            $ref: "#/components/schemas/RevenueByArea"

